version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - leetsync_data:/app/data
      # Mount local leetcode_portfolio folder so synchronized files persist on host
      - ./leetcode_portfolio:/app/leetcode_portfolio
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  leetsync_data:
